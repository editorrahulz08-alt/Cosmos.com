<!DOCTYPE html>
<html>
  <head>
  <title>COMONOM.COM</title>
  <style>
  body{
    margin:0;
    background:linear-gradient(rgba(0,0,0,0.1),rgba(0,0,0,0.1)),url(istockphoto-1410290731-612x612.jpg);
    background-size:cover;
    height:100vh;
    width:100%;
    font-family:Arial,sans-serif;
  }
  .nav{
    display:flex;
    justify-content: space-between;
    align-items:center;
    padding:10px 21px ;
    position:fixed;
    top:0;
    width:100%;
    background:blue;
  }
  .menu{
    display:none;
    height:20vh;
    width:100%;
  }
  .show{
    display:flex;
    flex-direction: column;
    background:#26D291D4;
    width:100%;
    animation:slideDown 0.3s ease;
  }
  @keyframes slideDown{
    from{
      opacity:0;
      transform:translateY(-12px);
    }
    to{
      opacity:1;
      transform:translateY(0);
    }
  }
  .dark{
    background:black;
    color:white;
  }
  .menu a{
    background:blue;
    color:white;
    padding:12px 23px;
    margin:10px;
    width:40px;
    border-radius:20px;
    text-decoration:none;
    transition:0.3s ease;
  }
  .menu a:hover{
    transform:translateY(-12px)scale(1.02);
  }
  .logo{
    display:flex;
    align-items:center;
    gap:34px;
    font-size:23px;
  }
  .logo img{
    width:120px;
    border-radius:50%;
    
  }
  .ipl{
    display:flex;
    justify-content:center;
    align-self:center;
    margin:34px;
  }
  .ipl img{
    width:80%;
    border-radius:30px;
    border:13px solid yellow ;
    box-shadow:0 2px 12px rgba(0,0,0,0.2);
  }
  .text{
    text-align: center;
    background:white;
    color:orange;
    margin-top:10vh;
    font-size:34px;
  }
  .content{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-top:80px;
  }
.put a{
  background:linear-gradient(to right,blue,grey,blue);
  color: white;
  padding:24px;
  text-decoration:none ;
  border-radius:18px;
  text-align:center;
  font-size:50px;
}

.card{
  background:white;
  padding:12px;
  border-radius:30px;
}
.nav button {
  background:white;
  color:black;
  font-size:29px;
  margin:12px;
  cursor:pointer;
  
}
.about{
  display:flex;
  justify-content:center;
  align-items:center;
  margin-top:60px;
}
.about-box{
  background:linear-gradient(to right,teal,blue);
  color:white;
  padding:12px 24px;
  margin:23px;
  border-radius:20px;
  box-shadow:0 2px 12px rgba(0,0,0,0.3);
  text-align:center;
  border:1px solid white;
  transition:0.3s ease;
}
.about-box:hover{
  transform:translateY(-17px)scale(1.03);
}

.footer{
  display:flex;
  justify-content:center;
  align-items:center;
  margin-top:1vh;
  gap:34px;
}
.footer img{
  width:50px;
  border-radius:50%;
}
.footer-box{
  background:blue;
}
.section{
  padding:60px;
  height:12vh;
}
.link a{
  color:white;
  text-decoration:none;
  background:black;
}
button{
  background:teal;
  color:white;
  padding:12px 21px;
  margin:20px;
  text-align:center;
  border-radius:20px;
  border:none;
}
.captain{
  display:flex;
  justify-content:center;
  align-items:center;
  width:100%;
  margin-top:40px;
}
.captain img{
  width:90%;
  border-radius:20px;
  border:1px solid white;
  box-shadow: 0 7px 24px rgba(11, 155, 227, 023);
}

.box{
  background:rgba(74, 120, 247, 0.81);
  color:white;
  text-align:center;
}
.text7{
  display:flex;
  justify-content:center;
  align-items:center;
  margin-top:27px;
}
.box2{
  background:hsla(231, 77%, 46%, 0.77);
  color:white;
  padding:12px 70px;
  margin:3px;
  border-radius:23px;
}
.text7 button{
  background:white;
  color:blue;
  text-align: center;
  padding:6px 12px;
  cursor:pointer;
}
@media(max-width:600px){
  .nav{
    flex-direction: column;
  }
  .text{
font-size:20px;
margin-top:30vh;
  }

  .text{
        flex-direction: column ;
  }
  .put{
    flex-direction: column ;
  }
  .put a{
    font-size:20px;

  }
}
@media (min-width:600px){
  .menu{
    width:100%;
  }
  .show{
    display:flex;
    background:teal;
    flex-direction: column;
  }
}
  </style>
  <script>
  function toggleMenu(){
    var menu=document.getElementById("menu");
    menu.classList.toggle("show");
  }
  function toggleDark(){
    document.body.classList.toggle("dark");
  }
  function changeText(){
    let text=document.getElementById("text");
    if(text.innerHTML==="IPL START TIME"){
      text.innerHTML="3:30pm And 7:30pm";
    }
    else{
      text.innerHTML="IPL START TIME";
    }
  }
</script>
  </head>
  <body>
    <div class="nav">
      <div class="logo">
        <img src="como-pass7o261.jpg">
      <h1><span style="color: lightgreen;">COMONOM.COM</span></h1>
      </div>
      <button onclick="toggleMenu()">✖️</button>
      <button onclick="toggleDark()">🔅</button>
      <div class="menu" id="menu">
        <a href="Project-Day 1.html">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
        <a href="#">Help</a>
      </div>
    </div>
    <div class="text">
      <h2>INDIAN PREMIER LEAGUE</h2>
    </div>
    <div class="ipl">
      <img src="images-captain.jpeg">
      </div>
    </div>
    <div class="content">
    <div class="put">
      <a href="https://www.modderguy.in/2026/03/iiiiiippppppph.html?m=1">Watch Now Free</a>
    </div>
    </div>
    <div class="captain">
      <img src="image_search_1774696331072.jpg">
    </div>
    <div class="text7">
      <div class="box2">
      <h3 id="text">IPL START TIME</h3>
      <button onclick="changeText()">Show</button>
      </div>
    </div>
      <div class="box">
        <h1>
        •MI
        •CSK
        •KKR
        •SRH
        </h1>
      </div>
    <div class="about">
      <div class="about-box">
        <h1>About IPL</h1>
        <p>Watch all IPL matches live with high quality streaming.
      Enjoy your favorite teams and players anytime, anywhere.</p>
      <button>Explore More</button>
      </div>
    </div>
    <div class="section">
    </div>
    <div class="footer">
      <div class="link">
      <a href="https://www.instagram.com/rajab15709?igsh=MXJ3M2VvcjlxeDRzcw==">Instagram</a>
      </div>
      <img src="images-insta.jpeg">
      <div class="link">
        <a href="#">Instagram</a>
      </div>
      <img src="images-insta.jpeg">
    </div>
  </body>
</html>
